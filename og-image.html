<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width: 1200px; height: 630px; overflow: hidden;
  font-family: 'DM Sans', system-ui, sans-serif;
  background: #0d0d0d;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.bg { position:absolute; inset:0; background: linear-gradient(135deg,#0d0d0d 0%,#1a1a2e 50%,#0d0d0d 100%); }
.blob1 { position:absolute; width:500px; height:500px; background:#7A8450; border-radius:50%; filter:blur(100px); opacity:.4; top:-150px; right:-80px; }
.blob2 { position:absolute; width:400px; height:400px; background:#e05c8a; border-radius:50%; filter:blur(100px); opacity:.35; bottom:-100px; left:200px; }
.content { position:relative; z-index:2; text-align:left; padding:0 100px; width:100%; }
.tag { display:inline-block; font-size:13px; letter-spacing:.2em; text-transform:uppercase; color:rgba(255,255,255,.4); border:1px solid rgba(255,255,255,.12); padding:8px 20px; border-radius:99px; margin-bottom:28px; font-family:monospace; }
h1 { font-size:82px; font-weight:900; line-height:.95; color:#fff; letter-spacing:-.03em; margin-bottom:20px; }
h1 em { font-style:italic; background:linear-gradient(90deg,#e05c8a,#7A8450); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
p { font-size:20px; color:rgba(255,255,255,.5); max-width:560px; line-height:1.5; }
.name { position:absolute; bottom:50px; right:100px; font-size:16px; color:rgba(255,255,255,.3); letter-spacing:.1em; text-transform:uppercase; font-family:monospace; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,700&family=DM+Sans:wght@400&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="bg"></div>
  <div class="blob1"></div>
  <div class="blob2"></div>
  <div class="content">
    <div class="tag">✦ Web Designer & Dev — portfólio 2026</div>
    <h1>design que<br/><em>conta histórias.</em></h1>
    <p>Sites, sistemas e experiências digitais que unem estética e funcionalidade.</p>
  </div>
  <div class="name">Giulia Oceano</div>
</body>
</html>
